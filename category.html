<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#0A4D5C;
  --teal2:#1A7585;
  --coral:#E96645;
  --coral2:#F07A5A;
  --cream:#F5E8CB;
  --cream2:#FEFCF7;
  --dark:#0D1F25;
  --mid:#2C4A52;
  --lgray:#F2F4F3;
  --border:rgba(10,77,92,0.10);
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--dark);overflow-x:hidden;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:18px 48px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,77,92,0.97);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream2);text-decoration:none;font-weight:700;}
.nav-logo span{color:var(--coral);}
.nav-right{display:flex;align-items:center;gap:20px;}
.nav-back{font-size:0.82rem;font-weight:600;color:rgba(245,232,203,0.6);text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.2s;}
.nav-back:hover{color:var(--cream);}
.nav-join{background:var(--coral);color:white;text-decoration:none;padding:9px 20px;border-radius:6px;font-weight:700;font-size:0.82rem;transition:background 0.2s;white-space:nowrap;}
.nav-join:hover{background:var(--coral2);}

.hero{background:var(--teal);padding:120px 48px 64px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 80% 50%,rgba(233,102,69,0.10) 0%,transparent 65%);}
.hero-inner{max-width:1100px;margin:0 auto;position:relative;}
.hero-breadcrumb{font-size:0.75rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,232,203,0.4);margin-bottom:20px;}
.hero-breadcrumb a{color:var(--coral);text-decoration:none;}
.hero-breadcrumb a:hover{text-decoration:underline;}
.hero-top{display:flex;align-items:flex-start;gap:24px;margin-bottom:16px;}
.hero-icon{font-size:3.5rem;line-height:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);border-radius:16px;padding:16px;flex-shrink:0;}
.hero-tag{font-size:0.7rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);margin-bottom:10px;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4vw,3.2rem);font-weight:900;color:var(--cream2);line-height:1.05;margin-bottom:12px;}
.hero-sub{font-size:1rem;color:rgba(245,232,203,0.65);line-height:1.8;max-width:580px;}
.hero-meta{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap;}
.hero-meta-badge{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.10);
  border-radius:100px;padding:6px 14px;
  font-size:0.78rem;font-weight:600;color:rgba(245,232,203,0.7);
}
.hero-meta-badge.live{
  background:rgba(26,122,74,0.20);
  border-color:rgba(26,122,74,0.40);
  color:#4ade80;
}
.hero-meta-badge.live::before{
  content:'';display:inline-block;
  width:6px;height:6px;border-radius:50%;
  background:#4ade80;margin-right:6px;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.main{max-width:1100px;margin:0 auto;padding:64px 48px 100px;}

.section-label{font-size:0.7rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);margin-bottom:10px;}
.section-title{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--teal);line-height:1.1;margin-bottom:8px;}
.section-sub{font-size:0.95rem;color:var(--mid);line-height:1.8;margin-bottom:40px;max-width:560px;}

.operator-grid{display:flex;flex-direction:column;gap:24px;margin-bottom:64px;}

.op-card{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:box-shadow 0.25s, transform 0.25s;
}
.op-card:hover{box-shadow:0 20px 60px rgba(10,77,92,0.09);transform:translateY(-2px);}
.op-card-body{padding:36px 40px;}
.op-card-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  margin-bottom:18px;gap:20px;
}
.op-live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(26,122,74,0.08);
  border:1px solid rgba(26,122,74,0.22);
  border-radius:100px;padding:4px 10px;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:#1a7a4a;margin-bottom:10px;
}
.op-live-dot{width:5px;height:5px;border-radius:50%;background:#1a7a4a;animation:pulse 2s infinite;}
.op-business-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--teal);margin-bottom:4px;line-height:1.1;}
.op-operator-name{font-size:0.87rem;color:var(--mid);font-weight:500;}
.op-price-tag{text-align:right;flex-shrink:0;}
.op-price{font-size:1.6rem;font-weight:700;color:var(--coral);line-height:1;}
.op-price-label{font-size:0.72rem;color:rgba(44,74,82,0.5);margin-top:3px;}
.op-desc{font-size:0.93rem;color:var(--mid);line-height:1.85;margin-bottom:22px;}
.op-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
.op-tag{background:var(--lgray);border-radius:6px;padding:5px 12px;font-size:0.78rem;font-weight:600;color:var(--teal);}
.op-divider{height:1px;background:rgba(10,77,92,0.06);margin-bottom:26px;}
.op-book-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.op-book-note{font-size:0.82rem;color:rgba(44,74,82,0.55);line-height:1.65;}
.op-book-note strong{color:var(--teal);font-weight:600;}
.btn-book{
  background:var(--coral);color:white;border:none;
  padding:14px 32px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.btn-book:hover{background:var(--coral2);transform:translateY(-1px);}

.book-form-wrap{
  background:var(--lgray);border-radius:0 0 16px 16px;
  padding:32px 40px;border-top:1px solid rgba(10,77,92,0.08);
  display:none;
}
.book-form-wrap.open{display:block;}
.book-form-title{font-size:1.05rem;font-weight:700;color:var(--teal);margin-bottom:24px;}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.bk-grid.full{grid-template-columns:1fr;}
.bk-field{display:flex;flex-direction:column;gap:6px;}
.bk-label{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(10,77,92,0.5);}
.bk-input{
  width:100%;background:white;
  border:1px solid rgba(10,77,92,0.12);border-radius:7px;
  padding:12px 15px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--dark);
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;appearance:none;
}
.bk-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(10,77,92,0.08);}
.bk-input::placeholder{color:rgba(44,74,82,0.30);}
.bk-input option{background:white;color:var(--dark);}
textarea.bk-input{resize:vertical;min-height:88px;line-height:1.6;}
.deposit-row{
  background:white;border:1px solid rgba(233,102,69,0.18);
  border-radius:10px;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  margin:18px 0;
}
.deposit-label{font-size:0.85rem;font-weight:600;color:var(--mid);}
.deposit-note{font-size:0.73rem;color:rgba(44,74,82,0.45);margin-top:2px;line-height:1.5;}
.deposit-amount{font-size:1.3rem;font-weight:700;color:var(--coral);}
.bk-err{
  background:rgba(200,70,42,0.07);
  border:1px solid rgba(200,70,42,0.18);
  border-radius:7px;padding:11px 14px;
  font-size:0.84rem;color:#c8462a;margin-top:8px;display:none;
}
.bk-actions{display:flex;gap:12px;align-items:center;margin-top:6px;}
.btn-submit{
  background:var(--teal);color:white;border:none;
  padding:15px 32px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;flex:1;
}
.btn-submit:hover{background:var(--teal2);}
.btn-submit:disabled{opacity:0.55;cursor:not-allowed;}
.btn-cancel-book{
  background:transparent;
  border:1px solid rgba(10,77,92,0.14);
  color:var(--mid);padding:15px 22px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;
  transition:all 0.2s;white-space:nowrap;
}
.btn-cancel-book:hover{background:rgba(10,77,92,0.04);}
.stripe-note{font-size:0.72rem;color:rgba(44,74,82,0.38);text-align:center;margin-top:12px;line-height:1.6;}

.coming-soon{
  background:white;border:1px solid var(--border);
  border-radius:16px;padding:64px 48px;
  text-align:center;margin-bottom:48px;
}
.cs-icon{font-size:4rem;margin-bottom:20px;display:block;}
.cs-title{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--teal);margin-bottom:14px;}
.cs-sub{font-size:1rem;color:var(--mid);line-height:1.8;max-width:460px;margin:0 auto 32px;}
.notify-form{display:flex;gap:10px;justify-content:center;max-width:400px;margin:0 auto;}
.notify-input{
  flex:1;background:var(--lgray);
  border:1px solid rgba(10,77,92,0.12);border-radius:8px;
  padding:13px 16px;
  font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--dark);
  outline:none;transition:border-color 0.2s;
}
.notify-input:focus{border-color:var(--teal);}
.notify-input::placeholder{color:rgba(44,74,82,0.35);}
.btn-notify{
  background:var(--coral);color:white;border:none;
  padding:13px 26px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:background 0.2s;
}
.btn-notify:hover{background:var(--coral2);}
.notify-done{font-size:0.88rem;color:var(--teal);font-weight:600;margin-top:14px;display:none;}

.list-cta{
  background:var(--teal);border-radius:16px;
  padding:52px 60px;
  display:flex;align-items:center;justify-content:space-between;gap:40px;
  margin-bottom:64px;position:relative;overflow:hidden;
}
.list-cta::before{
  content:'';position:absolute;right:-60px;top:-60px;
  width:260px;height:260px;border-radius:50%;
  background:rgba(233,102,69,0.10);
}
.list-cta-text{position:relative;}
.list-cta-tag{font-size:0.68rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--coral);margin-bottom:10px;}
.list-cta-title{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:900;color:var(--cream2);line-height:1.1;margin-bottom:8px;}
.list-cta-sub{font-size:0.9rem;color:rgba(245,232,203,0.60);line-height:1.75;max-width:460px;}
.list-cta-btn{
  background:var(--coral);color:white;text-decoration:none;
  padding:17px 38px;border-radius:8px;font-weight:700;font-size:0.95rem;
  white-space:nowrap;transition:all 0.2s;position:relative;flex-shrink:0;
}
.list-cta-btn:hover{background:var(--coral2);transform:translateY(-1px);}

.more-section{margin-top:64px;}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;}
.more-card{
  background:white;border:1px solid rgba(10,77,92,0.07);
  border-radius:12px;padding:22px 16px;
  text-align:center;cursor:pointer;transition:all 0.22s;
  text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:8px;
}
.more-card:hover{transform:translateY(-3px);border-color:rgba(10,77,92,0.18);box-shadow:0 12px 32px rgba(10,77,92,0.08);}
.more-card-icon{font-size:1.9rem;}
.more-card-name{font-size:0.82rem;font-weight:600;color:var(--teal);line-height:1.3;text-align:center;}
.more-card-live{
  font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:#1a7a4a;background:rgba(26,122,74,0.10);
  border-radius:4px;padding:2px 8px;
}

footer{background:var(--dark);padding:40px 48px;text-align:center;}
.footer-logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--cream2);margin-bottom:8px;}
.footer-logo span{color:var(--coral);}
.footer-text{font-size:0.82rem;color:rgba(245,232,203,0.35);line-height:1.8;}
.footer-text a{color:rgba(245,232,203,0.50);text-decoration:none;}
.footer-text a:hover{color:var(--coral);}

@media(max-width:900px){
  .more-grid{grid-template-columns:repeat(2,1fr);}
  .list-cta{flex-direction:column;padding:36px 28px;gap:28px;text-align:center;}
  .list-cta-sub{max-width:100%;}
  .list-cta::before{display:none;}
}
@media(max-width:768px){
  nav{padding:16px 20px;}
  .hero{padding:100px 20px 48px;}
  .main{padding:40px 20px 80px;}
  .op-card-body{padding:24px 20px;}
  .book-form-wrap{padding:24px 20px;}
  .op-card-header{flex-direction:column;gap:8px;}
  .bk-grid{grid-template-columns:1fr;}
  .hero-top{flex-direction:column;gap:16px;}
  .notify-form{flex-direction:column;}
  .bk-actions{flex-direction:column;}
  .btn-submit,.btn-cancel-book{width:100%;}
  footer{padding:32px 20px;}
  .coming-soon{padding:40px 24px;}
}
</style>
</head>

      priceLabel: 'per person',
      priceCents: 2500,
      tags: ['Carolina Beach State Park', '2 Hours', 'Family Friendly', 'Wildlife & Plants'],
      note: '$25 refundable deposit holds your spot. $10 balance due at the walk.'
    }
  ]
};

var activeForm = null;

function getCat() {
  return new URLSearchParams(window.location.search).get('cat') || '';
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function renderPage() {
  var cat = getCat();
  var d   = CAT_DATA[cat];
  if (!d) { window.location.href = '/'; return; }

  document.title = d.title + ' — ShoreList Wilmington, NC';
  document.getElementById('hero-icon').innerHTML = d.icon;
  document.getElementById('hero-title').textContent = d.title;
  document.getElementById('hero-sub').textContent = d.sub;
  document.getElementById('hero-breadcrumb-cat').textContent = d.title;

  var ops = OPERATORS[cat] || [];
  var metaHtml = '';
  if (ops.length > 0) {
    metaHtml += '<div class="hero-meta-badge live">' + ops.length + ' Operator' + (ops.length > 1 ? 's' : '') + ' Live Now</div>';
    metaHtml += '<div class="hero-meta-badge">Book Instantly</div>';
    metaHtml += '<div class="hero-meta-badge">Refundable Deposit</div>';
  } else {
    metaHtml += '<div class="hero-meta-badge">Coming Soon</div>';
    metaHtml += '<div class="hero-meta-badge">Notify Me When Live</div>';
  }
  document.getElementById('hero-meta').innerHTML = metaHtml;

  var html = '';

  if (ops.length > 0) {
    html += '<div class="section-label">Ready to Book</div>';
    html += '<h2 class="section-title">Choose Your Experience</h2>';
    html += '<p class="section-sub">All operators are local Wilmington businesses, personally verified by ShoreList. Secure your spot with a $25 fully refundable deposit — no risk, no surprises.</p>';
    html += '<div class="operator-grid">';

    ops.forEach(function(op) {
      html += '<div class="op-card" id="card-' + esc(op.id) + '">';
      html += '<div class="op-card-body">';
      html += '<div class="op-card-header">';
      html += '<div>';
      html += '<div class="op-live-badge"><span class="op-live-dot"></span>Live &amp; Booking</div>';
      html += '<div class="op-business-name">' + esc(op.business) + '</div>';
      html += '<div class="op-operator-name">with ' + esc(op.operator) + ' &nbsp;&middot;&nbsp; ' + esc(op.title) + '</div>';
      html += '</div>';
      html += '<div class="op-price-tag"><div class="op-price">' + esc(op.price) + '</div><div class="op-price-label">' + esc(op.priceLabel) + '</div></div>';
      html += '</div>';
      html += '<p class="op-desc">' + esc(op.desc) + '</p>';
      html += '<div class="op-tags">';
      op.tags.forEach(function(t) { html += '<span class="op-tag">' + esc(t) + '</span>'; });
      html += '</div>';
      html += '<div class="op-divider"></div>';
      html += '<div class="op-book-row">';
      html += '<div class="op-book-note"><strong>$25 refundable deposit</strong> holds your spot.<br/>' + esc(op.note) + '</div>';
      html += '<button class="btn-book" id="btn-' + esc(op.id) + '" onclick="toggleForm(\'' + esc(op.id) + '\')">Book This Experience &rarr;</button>';
      html += '</div>';
      html += '</div>';
      html += '<div class="book-form-wrap" id="form-' + esc(op.id) + '">';
      html += '<div class="book-form-title">&#128197;&nbsp; Book with ' + esc(op.business) + '</div>';
      html += '<div class="bk-grid">';
      html += '  <div class="bk-field"><label class="bk-label">Your Name</label><input class="bk-input" type="text" id="n-' + esc(op.id) + '" placeholder="First and last name" autocomplete="name"/></div>';
      html += '  <div class="bk-field"><label class="bk-label">Email Address</label><input class="bk-input" type="email" id="e-' + esc(op.id) + '" placeholder="your@email.com" autocomplete="email"/></div>';
      html += '</div>';
      html += '<div class="bk-grid">';
      html += '  <div class="bk-field"><label class="bk-label">Phone Number</label><input class="bk-input" type="tel" id="p-' + esc(op.id) + '" placeholder="(910) 000-0000" autocomplete="tel"/></div>';
      html += '  <div class="bk-field"><label class="bk-label">Party Size</label><select class="bk-input" id="ps-' + esc(op.id) + '"><option value="" disabled selected>How many guests?</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7+</option></select></div>';
      html += '</div>';
      html += '<div class="bk-grid">';
      html += '  <div class="bk-field"><label class="bk-label">Preferred Date</label><input class="bk-input" type="date" id="d-' + esc(op.id) + '"/></div>';
      html += '  <div class="bk-field"><label class="bk-label">Preferred Time</label><select class="bk-input" id="t-' + esc(op.id) + '"><option value="" disabled selected>Select a time</option><option>Morning (8AM–12PM)</option><option>Afternoon (12PM–4PM)</option><option>Evening (4PM–8PM)</option><option>Flexible / Any Time</option></select></div>';
      html += '</div>';
      html += '<div class="bk-grid full"><div class="bk-field"><label class="bk-label">Special Requests</label><textarea class="bk-input" id="nr-' + esc(op.id) + '" rows="2" placeholder="Accessibility needs, celebrating something special, questions for the operator..."></textarea></div></div>';
      html += '<div class="deposit-row">';
      html += '  <div><div class="deposit-label">Refundable Booking Deposit</div><div class="deposit-note">Holds your spot &nbsp;&middot;&nbsp; Fully refunded if unavailable &nbsp;&middot;&nbsp; No hidden fees</div></div>';
      html += '  <div class="deposit-amount">$25.00</div>';
      html += '</div>';
      html += '<div class="bk-err" id="err-' + esc(op.id) + '"></div>';
      html += '<div class="bk-actions">';
      html += '  <button class="btn-cancel-book" onclick="closeForm(\'' + esc(op.id) + '\')">Cancel</button>';
      html += '  <button class="btn-submit" id="sub-' + esc(op.id) + '" onclick="doBook(\'' + esc(op.id) + '\',\'' + esc(cat) + '\',\'' + esc(d.title) + '\',\'' + esc(op.business) + '\')">Secure My Spot &mdash; $25.00</button>';
      html += '</div>';
      html += '<p class="stripe-note">&#128274;&nbsp; Secure checkout via Stripe &nbsp;&middot;&nbsp; 256-bit SSL encryption &nbsp;&middot;&nbsp; Fully refundable if unavailable</p>';
      html += '</div>';
      html += '</div>';
    });

    html += '</div>';

  } else {
    html += '<div class="coming-soon">';
    html += '<span class="cs-icon">' + d.icon + '</span>';
    html += '<h2 class="cs-title">' + esc(d.title) + ' — Coming Soon</h2>';
    html += '<p class="cs-sub">We\'re signing local ' + esc(d.title.toLowerCase()) + ' operators right now. Drop your email and we\'ll notify you the moment bookings go live.</p>';
    html += '<div class="notify-form"><input class="notify-input" type="email" id="ni-' + esc(cat) + '" placeholder="your@email.com" autocomplete="email"/><button class="btn-notify" onclick="doNotify(\'' + esc(cat) + '\',\'' + esc(d.title) + '\')">Notify Me</button></div>';
    html += '<div class="notify-done" id="nd-' + esc(cat) + '">Got it! We\'ll email you when ' + esc(d.title) + ' goes live. &#10003;</div>';
    html += '</div>';
  }

  html += '<div class="list-cta">';
  html += '<div class="list-cta-text">';
  html += '<div class="list-cta-tag">For Local Operators</div>';
  html += '<div class="list-cta-title">Run a ' + esc(d.title) + ' business in Wilmington?</div>';
  html += '<div class="list-cta-sub">Get listed on ShoreList free. No upfront cost. Commission only on completed bookings. We put your listing directly in front of visitors already looking for something to do.</div>';
  html += '</div>';
  html += '<a href="/join" class="list-cta-btn">List Your Business Free &rarr;</a>';
  html += '</div>';

  html += '<div class="more-section">';
  html += '<div class="section-label">Keep Exploring</div>';
  html += '<h2 class="section-title">More Adventures Await</h2>';
  html += '<div class="more-grid">';
  var shown = 0;
  var keys = Object.keys(CAT_DATA);
  for (var i = 0; i < keys.length && shown < 8; i++) {
    var k  = keys[i];
    if (k === cat) continue;
    var cd   = CAT_DATA[k];
    var live = OPERATORS[k] && OPERATORS[k].length > 0;
    html += '<a class="more-card" href="/category?cat=' + esc(k) + '">';
    html += '<div class="more-card-icon">' + cd.icon + '</div>';
    html += '<div class="more-card-name">' + esc(cd.title) + '</div>';
    if (live) html += '<div class="more-card-live">Live Now</div>';
    html += '</a>';
    shown++;
  }
  html += '</div></div>';

  document.getElementById('main-content').innerHTML = html;

  ops.forEach(function(op) {
    var di = document.getElementById('d-' + op.id);
    if (di) {
      var tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      di.min = tomorrow.toISOString().split('T')[0];
    }
  });
}

function toggleForm(id) {
  var isOpen = document.getElementById('form-' + id).classList.contains('open');
  if (isOpen) { closeForm(id); } else { openForm(id); }
}

function openForm(id) {
  if (activeForm && activeForm !== id) closeForm(activeForm);
  var f   = document.getElementById('form-' + id);
  var btn = document.getElementById('btn-' + id);
  if (f) {
    f.classList.add('open');
    setTimeout(function() { f.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
  }
  if (btn) btn.textContent = 'Close Booking Form';
  activeForm = id;
}

function closeForm(id) {
  var f   = document.getElementById('form-' + id);
  var btn = document.getElementById('btn-' + id);
  var err = document.getElementById('err-' + id);
  if (f)   f.classList.remove('open');
  if (btn) btn.innerHTML = 'Book This Experience &rarr;';
  if (err) err.style.display = 'none';
  activeForm = null;
}

function doBook(id, cat, catLabel, opName) {
  var name   = document.getElementById('n-'  + id).value.trim();
  var email  = document.getElementById('e-'  + id).value.trim();
  var date   = document.getElementById('d-'  + id).value;
  var party  = document.getElementById('ps-' + id).value;
  var phone  = document.getElementById('p-'  + id).value.trim();
  var time   = document.getElementById('t-'  + id).value;
  var notes  = document.getElementById('nr-' + id).value.trim();
  var err    = document.getElementById('err-' + id);
  var btn    = document.getElementById('sub-' + id);

  if (!name || !email || !date || !party) {
    err.style.display = 'block';
    err.textContent   = 'Please fill in your name, email, preferred date, and party size.';
    err.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  if (!email.includes('@') || !email.includes('.')) {
    err.style.display = 'block';
    err.textContent   = 'Please enter a valid email address.';
    return;
  }

  err.style.display = 'none';
  btn.disabled      = true;
  btn.textContent   = 'Redirecting to secure checkout...';

  fetch('/.netlify/functions/create-checkout', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      category:      cat,
      categoryLabel: catLabel,
      operatorName:  opName,
      guestName:     name,
      guestEmail:    email,
      guestPhone:    phone,
      date:          date + (time ? ' — ' + time : ''),
      partySize:     party,
      notes:         notes,
      priceInCents:  2500
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error || 'No checkout URL returned.');
    }
  })
  .catch(function() {
    btn.disabled    = false;
    btn.innerHTML   = 'Secure My Spot &mdash; $25.00';
    err.style.display = 'block';
    err.textContent = 'Something went wrong. Please try again or email us at shorelistwilmington@gmail.com';
  });
}

function doNotify(cat, title) {
  var inp  = document.getElementById('ni-' + cat);
  var done = document.getElementById('nd-' + cat);
  if (!inp || !inp.value.trim()) { inp.focus(); return; }
  fetch('https://formspree.io/f/xeevzzqd', {
    method:  'POST',
    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email:    inp.value.trim(),
      category: title,
      _subject: 'ShoreList Notify Request: ' + title
    })
  }).catch(function() {});
  if (inp.parentElement) inp.parentElement.style.display = 'none';
  if (done) done.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', renderPage);
</script>

</body>
</html>
