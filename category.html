var CS={};
var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DW=['Su','Mo','Tu','We','Th','Fr','Sa'];

function calInit(id,sched){
  var n=new Date();
  CS[id]={y:n.getFullYear(),m:n.getMonth(),date:null,slot:null,sched:sched,booked:{},loaded:{}};
  calDraw(id);
  calLoad(id,n.getFullYear(),n.getMonth()+1);
}

function calDraw(id){
  var s=CS[id]; if(!s) return;
  var ml=document.getElementById('cm-'+id); if(ml) ml.textContent=MN[s.m]+' '+s.y;
  var g=document.getElementById('cg-'+id); if(!g) return;
  var today=new Date(); today.setHours(0,0,0,0);
  var tmrw=new Date(today); tmrw.setDate(tmrw.getDate()+1);
  var first=new Date(s.y,s.m,1);
  var dim=new Date(s.y,s.m+1,0).getDate();
  var fdow=first.getDay();
  var h=''; DW.forEach(function(d){h+='<div class="cal-dh">'+d+'</div>';});
  for(var i=0;i<fdow;i++) h+='<div class="cal-d empty"></div>';
  for(var day=1;day<=dim;day++){
    var dt=new Date(s.y,s.m,day); dt.setHours(0,0,0,0);
    var ds=pad(s.y)+'-'+pad(s.m+1)+'-'+pad(day);
    var dow=dt.getDay();
    var past=dt<tmrw;
    var avail=!past&&s.sched.days.indexOf(dow)!==-1;
    var sel=s.date===ds;
    var tod=dt.getTime()===today.getTime();
    var cls='cal-d'+(past?' past':avail?' yes':' no')+(sel?' picked':'')+(tod&&!sel?' today-ring':'');
    var oc=avail?' onclick="cpick(\''+id+'\',\''+ds+'\')\"':'';
    h+='<div class="'+cls+'"'+oc+'>'+day+'</div>';
  }
  g.innerHTML=h;
  if(s.date) slotDraw(id);
}

function cpick(id,ds){
  var s=CS[id]; if(!s) return;
  s.date=ds; s.slot=null;
  document.getElementById('hd-'+id).value='';
  document.getElementById('ht-'+id).value='';
  sumHide(id);
  calDraw(id);
  slotDraw(id);
}

function slotDraw(id){
  var s=CS[id]; if(!s||!s.date) return;
  var w=document.getElementById('sw-'+id); if(!w) return;
  var taken=s.booked[s.date]||[];
  var do2=new Date(s.date+'T12:00:00');
  var lbl=do2.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var h='<div class="slots-area"><div class="slots-for">Available times for <strong>'+lbl+'</strong></div><div class="slots-row">';
  s.sched.slots.forEach(function(sl){
    var tk=taken.indexOf(sl)!==-1;
    var pk=s.slot===sl;
    var cls='slt'+(tk?' slt-taken':'')+(pk?' slt-picked':'');
    var oc=tk?'':' onclick="spick(\''+id+'\',\''+sl.replace(/'/g,"\\'")+'\')"';
    h+='<button type="button" class="'+cls+'"'+oc+'>'+sl+(tk?'<span class="slt-sub">Sold Out</span>':'')+'</button>';
  });
  h+='</div></div>';
  w.innerHTML=h;
}

function spick(id,sl){
  var s=CS[id]; if(!s) return;
  s.slot=sl;
  document.getElementById('hd-'+id).value=s.date;
  document.getElementById('ht-'+id).value=sl;
  sumShow(id);
  slotDraw(id);
  var sum=document.getElementById('ss-'+id);
  if(sum) setTimeout(function(){sum.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function sumShow(id){
  var s=CS[id]; var el=document.getElementById('ss-'+id); if(!el||!s||!s.date||!s.slot) return;
  var do2=new Date(s.date+'T12:00:00');
  var fmt=do2.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  el.innerHTML='&#10003;&nbsp; <strong>'+fmt+' at '+s.slot+'</strong> selected — tap below to confirm';
  el.classList.add('on');
}
function sumHide(id){var el=document.getElementById('ss-'+id); if(el) el.classList.remove('on');}

function cprev(id){var s=CS[id];if(!s)return;if(s.m===0){s.m=11;s.y--;}else s.m--;s.date=null;s.slot=null;var sw=document.getElementById('sw-'+id);if(sw)sw.innerHTML='';sumHide(id);calDraw(id);calLoad(id,s.y,s.m+1);}
function cnext(id){var s=CS[id];if(!s)return;if(s.m===11){s.m=0;s.y++;}else s.m++;s.date=null;s.slot=null;var sw=document.getElementById('sw-'+id);if(sw)sw.innerHTML='';sumHide(id);calDraw(id);calLoad(id,s.y,s.m+1);}

function calLoad(id,y,m){
  var key=y+'-'+m; var s=CS[id]; if(!s||s.loaded[key]) return;
  s.loaded[key]=true;
  fetch('/.netlify/functions/get-availability?operatorId='+encodeURIComponent(id)+'&year='+y+'&month='+m)
    .then(function(r){return r.json();})
    .then(function(data){
      (data.booked||[]).forEach(function(b){
        if(!b.date||!b.timeSlot) return;
        if(!s.booked[b.date]) s.booked[b.date]=[];
        if(s.booked[b.date].indexOf(b.timeSlot)===-1) s.booked[b.date].push(b.timeSlot);
      });
      calDraw(id);
    }).catch(function(){});
}

function pad(n){return String(n).padStart(2,'0');}

var AF=null;
function getCat(){return new URLSearchParams(window.location.search).get('cat')||'';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function togForm(id){
  var open=document.getElementById('form-'+id).classList.contains('open');
  if(open) closeForm(id); else openForm(id);
}
function openForm(id){
  if(AF&&AF!==id) closeForm(AF);
  var f=document.getElementById('form-'+id);
  var b=document.getElementById('btn-'+id);
  if(f){f.classList.add('open');setTimeout(function(){f.scrollIntoView({behavior:'smooth',block:'start'});},60);}
  if(b) b.textContent='Close Booking Form';
  AF=id;
}
function closeForm(id){
  var f=document.getElementById('form-'+id);
  var b=document.getElementById('btn-'+id);
  var e=document.getElementById('err-'+id);
  if(f) f.classList.remove('open');
  if(b) b.innerHTML='Book This Experience &rarr;';
  if(e) e.style.display='none';
  AF=null;
}

function doBook(id,cat,catLabel,opName,opId){
  var nm=document.getElementById('n-'+id).value.trim();
  var em=document.getElementById('e-'+id).value.trim();
  var ph=document.getElementById('p-'+id).value.trim();
  var ps=document.getElementById('ps-'+id).value;
  var dt=document.getElementById('hd-'+id).value;
  var tm=document.getElementById('ht-'+id).value;
  var nt=document.getElementById('nr-'+id).value.trim();
  var er=document.getElementById('err-'+id);
  var bt=document.getElementById('sub-'+id);
  if(!nm||!em||!ps){er.style.display='block';er.textContent='Please fill in your name, email, and party size.';er.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  if(!dt||!tm){er.style.display='block';er.textContent='Please select a date and time on the calendar above.';er.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  if(!em.includes('@')||!em.includes('.')){er.style.display='block';er.textContent='Please enter a valid email address.';return;}
  er.style.display='none';
  bt.disabled=true;
  bt.textContent='Securing your spot\u2026';
  fetch('/.netlify/functions/create-checkout',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({category:cat,categoryLabel:catLabel,operatorName:opName,operatorId:opId,guestName:nm,guestEmail:em,guestPhone:ph,date:dt,timeSlot:tm,partySize:ps,notes:nt,priceInCents:2500})
  }).then(function(r){return r.json();}).then(function(data){
    if(data.url){window.location.href=data.url;}
    else{throw new Error(data.error||'No checkout URL');}
  }).catch(function(){
    bt.disabled=false;bt.innerHTML='Secure My Spot &mdash; $25.00';
    er.style.display='block';er.textContent='Something went wrong. Please try again or email shorelistwilmington@gmail.com';
  });
}

function doNotify(cat,title){
  var inp=document.getElementById('ni-'+cat);
  var done=document.getElementById('nd-'+cat);
  if(!inp||!inp.value.trim()){if(inp)inp.focus();return;}
  fetch('https://formspree.io/f/xeevzzqd',{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/json'},body:JSON.stringify({email:inp.value.trim(),category:title})}).catch(function(){});
  if(inp.parentElement) inp.parentElement.style.display='none';
  if(done) done.style.display='block';
}

document.addEventListener('DOMContentLoaded',renderPage);
